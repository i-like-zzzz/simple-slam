simple_slam_node:
  ros__parameters:
    # 回放 bag 时，这个仓库默认示例数据的机器人 TF 树根是 base_footprint，
    # 不是 odom。把 map 直接挂到 base_footprint，避免 map 与雷达树断开。
    use_sim_time: true
    map_frame: map
    odom_frame: base_footprint
    published_frame: base_link

    system_mode: mapping
    enable_backend: false
    enable_tf_smoothing: true
    tf_translation_alpha: 0.08
    tf_rotation_alpha: 0.10

    publish_keyframe_markers: true
    keyframe_marker_scale: 0.25
    debug_log_every_n_scans: 100

    min_range: 0.05
    max_range: 20.0
    voxel_filter_size: 0.05

    scans_per_accumulation: 1
    active_submap_num_range_data: 90
    min_range_points_for_match: 20
    keyframe_translation_threshold: 0.20
    keyframe_rotation_threshold: 0.17

    lidar_odom_linear_window: 0.20
    lidar_odom_angular_window: 0.20
    lidar_odom_translation_weight: 1.0
    lidar_odom_rotation_weight: 0.2
    lidar_odom_point_sigma: 0.15
    lidar_odom_max_points: 48

    linear_search_window: 0.3
    angular_search_window: 0.35
    linear_search_step: 0.05
    angular_search_step: 0.05
    translation_delta_cost_weight: 1.0
    rotation_delta_cost_weight: 0.2

    submap_resolution: 0.05
    submap_width: 400
    submap_height: 400
    submap_hit_probability: 0.7
    submap_miss_probability: 0.49
